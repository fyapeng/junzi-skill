name: "Validate Junzi"

on:
  push:
    branches:
      - "main"
  pull_request:
  workflow_dispatch:

permissions:
  contents: "read"

jobs:
  validate:
    runs-on: "ubuntu-latest"
    steps:
      - name: "Check out repository"
        uses: "actions/checkout@v4"
      - name: "Set up Python"
        uses: "actions/setup-python@v6"
        with:
          python-version: "3.12"
      - name: "Set up Node.js"
        uses: "actions/setup-node@v4"
        with:
          node-version: "22"
          cache: "npm"
          cache-dependency-path: "website/package-lock.json"
      - name: "Install validation dependencies"
        run: "python -m pip install PyYAML"
      - name: "Parse YAML and citation metadata"
        run: "python -c \"import pathlib, yaml; [yaml.safe_load(pathlib.Path(p).read_text(encoding='utf-8')) for p in ['agents/openai.yaml', 'evals/cases.yaml', 'evals/triggers.yaml', 'CITATION.cff']]\""
      - name: "Validate skill and publication files"
        run: "python scripts/validate.py"
      - name: "Install website dependencies"
        working-directory: "website"
        run: "npm ci"
      - name: "Build website"
        working-directory: "website"
        run: "npm run build"
