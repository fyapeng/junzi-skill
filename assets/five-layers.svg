<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="520" viewBox="0 0 1200 520" role="img" aria-labelledby="title desc">
  <title id="title">君子系统五层结构</title>
  <desc id="desc">道、法、势、术、器由内向外生成能力，并由实践结果逐层反馈。</desc>
  <defs>
    <linearGradient id="paper" x1="0" y1="0" x2="1" y2="1">
      <stop stop-color="#fbf7ed"/><stop offset="1" stop-color="#efe4d1"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="7" stdDeviation="9" flood-color="#513c2b" flood-opacity=".12"/>
    </filter>
    <marker id="arrow" markerWidth="8" markerHeight="8" refX="7" refY="4" orient="auto"><path d="M0 0l8 4-8 4z" fill="#9a3026"/></marker>
    <style>
      .cn{font-family:"Noto Serif SC","Songti SC","SimSun",serif}.sans{font-family:"Noto Sans SC","Microsoft YaHei",sans-serif}
      .node{fill:#fffaf0;stroke-width:1.5;filter:url(#shadow)}.num{font:700 13px Arial;letter-spacing:2px}.name{font-size:34px;font-weight:700}.verb{font-size:16px;font-weight:700}.ask{font-size:13px;fill:#695f55}
    </style>
  </defs>
  <rect width="1200" height="520" rx="24" fill="url(#paper)"/>
  <path d="M72 82h44" stroke="#9a3026" stroke-width="2"/><text x="132" y="87" class="sans" font-size="13" font-weight="700" letter-spacing="4" fill="#5b625e">FROM CHARACTER TO PRACTICE</text>
  <text x="72" y="137" class="cn" font-size="34" font-weight="700" fill="#202623">内在立心，外化成事</text>
  <text x="72" y="170" class="sans" font-size="15" fill="#67645e">五层有生成次序，也保留由结果返回根本的修正通道</text>

  <g transform="translate(72 214)">
    <g transform="translate(0)"><rect class="node" width="180" height="154" rx="18" stroke="#8f2922"/><text x="22" y="30" class="num" fill="#8f2922">01 · DAO</text><text x="22" y="72" class="cn name" fill="#8f2922">道</text><text x="75" y="69" class="cn verb" fill="#2a302d">立其心</text><text x="22" y="108" class="cn ask">为何行动</text><text x="22" y="132" class="cn ask">向何处去</text></g>
    <g transform="translate(210)"><rect class="node" width="180" height="154" rx="18" stroke="#b17b35"/><text x="22" y="30" class="num" fill="#9b6a2e">02 · FA</text><text x="22" y="72" class="cn name" fill="#9b6a2e">法</text><text x="75" y="69" class="cn verb" fill="#2a302d">明其知</text><text x="22" y="108" class="cn ask">如何学习</text><text x="22" y="132" class="cn ask">判断与修正</text></g>
    <g transform="translate(420)"><rect class="node" width="180" height="154" rx="18" stroke="#3f6664"/><text x="22" y="30" class="num" fill="#3f6664">03 · SHI</text><text x="22" y="72" class="cn name" fill="#3f6664">势</text><text x="75" y="69" class="cn verb" fill="#2a302d">察其变</text><text x="22" y="108" class="cn ask">身处何时何地</text><text x="22" y="132" class="cn ask">何者真正关键</text></g>
    <g transform="translate(630)"><rect class="node" width="180" height="154" rx="18" stroke="#4d5f7d"/><text x="22" y="30" class="num" fill="#4d5f7d">04 · SHU</text><text x="22" y="72" class="cn name" fill="#4d5f7d">术</text><text x="75" y="69" class="cn verb" fill="#2a302d">成其事</text><text x="22" y="108" class="cn ask">创造可行道路</text><text x="22" y="132" class="cn ask">组织并落实行动</text></g>
    <g transform="translate(840)"><rect class="node" width="180" height="154" rx="18" stroke="#725b6f"/><text x="22" y="30" class="num" fill="#725b6f">05 · QI</text><text x="22" y="72" class="cn name" fill="#725b6f">器</text><text x="75" y="69" class="cn verb" fill="#2a302d">驭其用</text><text x="22" y="108" class="cn ask">选择组合工具</text><text x="22" y="132" class="cn ask">扩展并检验能力</text></g>
    <path d="M180 77h25M390 77h25M600 77h25M810 77h25" stroke="#9a3026" stroke-width="2" marker-end="url(#arrow)"/>
  </g>
  <path d="M1110 390v58H165v-45" fill="none" stroke="#9a3026" stroke-width="1.5" stroke-dasharray="6 7" marker-end="url(#arrow)"/>
  <rect x="478" y="426" width="245" height="50" rx="25" fill="#202a27"/><text x="600" y="457" text-anchor="middle" class="cn" font-size="16" fill="#f6ecdc">实践检验 · 分层回溯</text>
  <text x="72" y="495" class="cn" font-size="13" fill="#6f665e">向外：道定方向，法成认识，势接现实，术开道路，器拓能力</text>
  <text x="1128" y="495" text-anchor="end" class="cn" font-size="13" fill="#9a3026">向内：结果可以修正从器到道的理解</text>
</svg>
